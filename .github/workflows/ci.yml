name: CI

on:
    push:
        branches:
            - main
            - "chore/**"
            - "feature/**"
            - "refactor/**"
    pull_request:

jobs:
    test-and-lint:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Show Swift version
              run: swift --version

            - name: Run unit tests
              run: swift test --parallel

            - name: Lint Swift formatting rules
              run: |
                  swift format lint --recursive \
                    src \
                    tests
